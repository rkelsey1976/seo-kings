<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#0B1324"/>
  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <path d="M0 100h800M0 200h800M0 300h800M0 400h800"/>
    <path d="M100 0v500M200 0v500M300 0v500M400 0v500M500 0v500M600 0v500M700 0v500"/>
  </g>
  <!-- Bar chart -->
  <!-- Labels -->
  <text x="150" y="380" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="11" text-anchor="middle">Midas</text>
  <text x="330" y="380" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="11" text-anchor="middle">Peachy</text>
  <text x="510" y="380" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="11" text-anchor="middle">Jay's</text>
  <!-- Bars -->
  <rect x="110" y="200" width="80" height="160" rx="4" fill="#4A90A4" opacity="0.9"/>
  <rect x="290" y="140" width="80" height="220" rx="4" fill="#4A90A4" opacity="0.9"/>
  <rect x="470" y="250" width="80" height="110" rx="4" fill="#4A90A4" opacity="0.9"/>
  <!-- Glow behind bars -->
  <rect x="100" y="130" width="100" height="240" rx="10" fill="#4A90A4" opacity="0.06"/>
  <rect x="280" y="70" width="100" height="300" rx="10" fill="#4A90A4" opacity="0.06"/>
  <rect x="460" y="180" width="100" height="190" rx="10" fill="#4A90A4" opacity="0.06"/>
  <!-- Rank labels on bars -->
  <text x="150" y="240" fill="white" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">#1</text>
  <text x="330" y="190" fill="white" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">#1</text>
  <text x="510" y="290" fill="white" font-family="monospace" font-size="22" font-weight="bold" text-anchor="middle">Top 3</text>
  <!-- Decorative accent orbs -->
  <circle cx="680" cy="100" r="50" fill="#4A90A4" opacity="0.06"/>
  <circle cx="120" cy="420" r="40" fill="#E8715A" opacity="0.04"/>
</svg>
